name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          cinderhaven:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: ci
                password: ci
                dbname: ci
                schema: public
                threads: 1
          EOF

      - name: Validate project structure
        working-directory: cinderhaven
        run: dbt parse

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile scripts/ingest_sqlite_to_postgres.py
