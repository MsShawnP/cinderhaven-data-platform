version: 2

models:
  # ── Reference / Dimension ──────────────────────────────
  - name: stg_product_master
    description: Cleaned product catalog — 50 SKUs across 3 product lines.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 40
          max_value: 60
    columns:
      - name: sku
        description: Primary key — Cinderhaven SKU code (e.g. CHP-0001).
        tests:
          - unique
          - not_null
      - name: product_name
        description: Display name for the product.
        tests: [not_null]
      - name: product_line
        description: Top-level product family (Artisan Sauces, Pantry Staples, Specialty Condiments).
        tests:
          - not_null
          - accepted_values:
              values: ['Artisan Sauces', 'Pantry Staples', 'Specialty Condiments']
      - name: subcategory
        description: Product subcategory within the product line.
        tests:
          - not_null
          - accepted_values:
              values: ['sauce', 'dry', 'oil', 'vinegar', 'condiment', 'hot_sauce']

  - name: stg_stores
    description: Retail locations — 903 stores across 11 retailers.
    columns:
      - name: store_id
        description: Primary key — unique store identifier.
        tests: [unique, not_null]
      - name: retailer
        description: Name of the retailer that owns this store.
        tests: [not_null]
      - name: chain_name
        description: Regional chain or banner name within the retailer.
        tests: [not_null]

  - name: stg_distributors
    description: Distributor entities — 2 distributors (UNFI, KeHE).
    columns:
      - name: distributor_id
        description: Primary key — unique distributor identifier.
        tests: [unique, not_null]
      - name: name
        description: Distributor display name.
        tests: [not_null]
      - name: type
        description: Distributor type classification.
        tests: [not_null]

  - name: stg_retailers
    description: Retailer entities — 11 retailers.
    columns:
      - name: retailer_id
        description: Primary key — unique retailer identifier.
        tests: [unique, not_null]
      - name: name
        description: Retailer display name.
        tests: [not_null]
      - name: channel_type
        description: Retailer channel classification (grocery, mass, club, etc.).
        tests: [not_null]

  - name: stg_retailer_rules
    description: Dispute rules by retailer and deduction type.
    columns:
      - name: retailer_id
        description: Foreign key to retailer entity.
        tests: [not_null]
      - name: deduction_type
        description: Category of deduction this rule governs.
        tests: [not_null]

  - name: stg_deduction_codes
    description: Retailer-specific deduction reason codes.
    columns:
      - name: code_id
        description: Primary key — unique code identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to retailer that uses this code.
        tests: [not_null]
      - name: deduction_type
        description: Deduction category this code maps to.
        tests: [not_null]

  - name: stg_retailer_requirements
    description: Retailer field-level requirements — 180 records.
    columns:
      - name: retailer
        description: Retailer name.
        tests: [not_null]
      - name: field
        description: Requirement field name.
        tests: [not_null]
      - name: is_required
        description: Whether this field is required (boolean, cast from integer).
        tests: [not_null]

  - name: stg_sku_distributors
    description: SKU-to-distributor assignments — 55 records.
    columns:
      - name: sku
        description: Foreign key to product_master SKU.
        tests: [not_null]
      - name: distributor_id
        description: Foreign key to distributors.
        tests: [not_null]

  - name: stg_edi_requirements
    description: EDI compliance requirements by retailer.
    columns:
      - name: requirement_id
        description: Primary key — unique requirement identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to retailer with this EDI requirement.
        tests: [not_null]

  # ── Pricing ────────────────────────────────────────────
  - name: stg_sku_costs
    description: SKU-level cost and pricing structure — 50 SKUs.
    columns:
      - name: sku
        description: Primary key — SKU code, foreign key to product_master.
        tests: [unique, not_null]
      - name: cogs_per_unit
        description: Cost of goods sold per unit in USD.
        tests: [not_null]
      - name: landed_cost_per_unit
        description: Fully loaded cost per unit including freight and handling, in USD.
        tests: [not_null]

  - name: stg_price_history
    description: Historical wholesale price changes by SKU/retailer — 234 records.
    columns:
      - name: sku
        description: SKU code — foreign key to product_master.
        tests: [not_null]
      - name: retailer
        description: Retailer name for this price record.
        tests: [not_null]
      - name: effective_date
        description: Date this price became effective.
        tests: [not_null]

  # ── Distribution & Promotion ───────────────────────────
  - name: stg_distribution_log
    description: SKU-store authorization records — 7,210 records.
    columns:
      - name: sku
        description: SKU code authorized for distribution.
        tests: [not_null]
      - name: store_id
        description: Store where the SKU is authorized.
        tests: [not_null]
      - name: authorized_date
        description: Date the SKU was authorized at this store.
        tests: [not_null]

  - name: stg_promotions
    description: Promotional events with discount and funding details — 185 records.
    columns:
      - name: promo_id
        description: Unique promotion identifier.
        tests: [not_null]
      - name: sku
        description: SKU on promotion.
        tests: [not_null]
      - name: retailer
        description: Retailer running the promotion.
        tests: [not_null]

  # ── Transactions ───────────────────────────────────────
  - name: stg_orders
    description: B2B purchase orders from retailers — 11,634 orders.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10000
          max_value: 15000
    columns:
      - name: order_id
        description: Primary key — unique purchase order identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to the ordering retailer.
        tests: [not_null]
      - name: po_date
        description: Date the purchase order was placed.
        tests: [not_null]
      - name: total_value
        description: Total order value in USD.
        tests: [not_null]

  - name: stg_order_lines
    description: B2B order line items — 59,496 lines.
    columns:
      - name: order_line_id
        description: Primary key — unique line item identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the parent order.
        tests: [not_null]
      - name: sku
        description: Product ordered on this line.
        tests: [not_null]

  - name: stg_shipments
    description: Shipment records with compliance flags — 11,634 shipments.
    columns:
      - name: shipment_id
        description: Primary key — unique shipment identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the order being fulfilled.
        tests: [not_null]
      - name: ship_date
        description: Date the shipment was dispatched.
        tests: [not_null]

  - name: stg_pack_records
    description: Pack/label compliance records — 11,634 records.
    columns:
      - name: pack_record_id
        description: Primary key — unique pack record identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the order this pack record covers.
        tests: [not_null]

  # ── Sales / POS ────────────────────────────────────────
  - name: stg_scan_data
    description: Weekly POS scan data — 977K rows.
    columns:
      - name: sku
        description: Product scanned at point of sale.
        tests: [not_null]
      - name: store_id
        description: Store where the scan occurred.
        tests: [not_null]
      - name: week_ending
        description: Saturday date ending the reporting week.
        tests: [not_null]

  - name: stg_chargebacks
    description: Legacy chargeback events — 761 records.
    columns:
      - name: retailer
        description: Retailer that issued the chargeback.
        tests: [not_null]
      - name: amount
        description: Chargeback amount in USD.
        tests: [not_null]

  # ── Deductions / Disputes ──────────────────────────────
  - name: stg_deductions
    description: Deduction records from retailer remittances — 13,496 records.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 12000
          max_value: 16000
    columns:
      - name: deduction_id
        description: Primary key — unique deduction identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to the deducting retailer.
        tests: [not_null]
      - name: deduction_type
        description: Category of deduction (shortage, pricing, promotion, quality, logistics).
        tests: [not_null]
      - name: amount
        description: Deduction amount in USD.
        tests: [not_null]
      - name: deduction_date
        description: Date the deduction was applied.
        tests: [not_null]

  - name: stg_disputes
    description: Dispute filing records — 6,105 disputes.
    columns:
      - name: dispute_id
        description: Primary key — unique dispute identifier.
        tests: [unique, not_null]
      - name: deduction_id
        description: Foreign key to the deduction being disputed.
        tests: [not_null]
      - name: outcome
        description: Resolution outcome of the dispute.
        tests:
          - not_null
          - accepted_values:
              values:
                - won_full
                - won_partial
                - lost_deadline
                - lost_evidence
                - lost_no_response
                - lost_other
                - pending
                - abandoned

  - name: stg_dispute_evidence
    description: Evidence items linked to disputes — 11,525 records.
    columns:
      - name: evidence_id
        description: Primary key — unique evidence item identifier.
        tests: [unique, not_null]
      - name: dispute_id
        description: Foreign key to the parent dispute.
        tests: [not_null]

  - name: stg_remittances
    description: Remittance payment bundles from retailers — 1,278 records.
    columns:
      - name: remittance_id
        description: Primary key — unique remittance identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to the paying retailer.
        tests: [not_null]
      - name: received_date
        description: Date the remittance was received.
        tests: [not_null]

  - name: stg_post_audit_claims
    description: Retroactive post-audit claims — 38 records.
    columns:
      - name: claim_id
        description: Primary key — unique claim identifier.
        tests: [unique, not_null]
      - name: deduction_id
        description: Foreign key to the original deduction.
        tests: [not_null]

  # ── DTC / E-Commerce ──────────────────────────────────
  - name: stg_shopify_orders
    description: Shopify DTC order headers — 79,000 orders.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 70000
          max_value: 90000
    columns:
      - name: order_id
        description: Primary key — Shopify order ID.
        tests: [unique, not_null]
      - name: order_number
        description: Customer-facing order number.
        tests: [unique, not_null]
      - name: created_at
        description: Timestamp when the order was placed.
        tests: [not_null]
      - name: email
        description: Customer email address.
        tests: [not_null]
      - name: financial_status
        description: Payment status of the order.
        tests:
          - not_null
          - accepted_values:
              values: ['paid', 'partially_refunded', 'refunded']
      - name: fulfillment_status
        description: Fulfillment status of the order.
        tests:
          - not_null
          - accepted_values:
              values: ['fulfilled', 'unfulfilled', 'partial']

  - name: stg_shopify_transactions
    description: Shopify payment transactions — 29,533 records.
    columns:
      - name: transaction_id
        description: Primary key — unique transaction identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the Shopify order.
        tests: [not_null]
      - name: transaction_date
        description: Date the transaction was processed.
        tests: [not_null]
      - name: payment_method
        description: Payment method used (credit_card, debit_card, etc.).
        tests: [not_null]
      - name: status
        description: Transaction status.
        tests: [not_null]

  - name: stg_shopify_payouts
    description: Shopify payout batches — 191 records.
    columns:
      - name: payout_id
        description: Primary key — unique payout identifier.
        tests: [unique, not_null]
      - name: payout_date
        description: Date the payout was disbursed.
        tests: [not_null]
      - name: status
        description: Payout status.
        tests: [not_null]

  - name: stg_shopify_refunds
    description: Shopify DTC refunds — 1,184 records.
    columns:
      - name: refund_id
        description: Primary key — unique refund identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the original Shopify order.
        tests: [not_null]
      - name: refund_date
        description: Date the refund was processed.
        tests: [not_null]
      - name: refund_amount
        description: Refund amount in USD.
        tests: [not_null]
      - name: refund_type
        description: Type of refund (full or partial).
        tests:
          - not_null
          - accepted_values:
              values: ['full', 'partial']

  - name: stg_shopify_chargebacks
    description: Shopify DTC chargebacks — 232 records.
    columns:
      - name: chargeback_id
        description: Primary key — unique chargeback identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the disputed Shopify order.
        tests: [not_null]
      - name: chargeback_date
        description: Date the chargeback was filed.
        tests: [not_null]
      - name: chargeback_amount
        description: Disputed amount in USD.
        tests: [not_null]

  - name: stg_shopify_order_lines
    description: Shopify DTC line items — 189,714 lines.
    columns:
      - name: line_id
        description: Primary key — unique line item identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the parent Shopify order.
        tests: [not_null]
      - name: sku
        description: Product SKU ordered.
        tests: [not_null]
