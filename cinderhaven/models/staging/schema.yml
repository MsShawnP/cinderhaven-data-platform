version: 2

models:
  # ── Shared tables ─────────────────────────────────────
  - name: stg_product_master
    description: Cleaned product catalog — 30 SKUs across 3 product lines.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_name
        tests: [not_null]
      - name: product_line
        tests:
          - not_null
          - accepted_values:
              values: ['Artisan Sauces', 'Pantry Staples', 'Specialty Condiments', 'Dried Goods', 'Snack Bites']

  - name: stg_sku_costs
    description: SKU-level cost and per-channel pricing.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: cogs_per_unit
        tests: [not_null]
      - name: landed_cost_per_unit
        tests: [not_null]

  - name: stg_stores
    description: 640 retail locations across 6 retailers.
    columns:
      - name: store_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: chain_name
        tests: [not_null]

  - name: stg_product_master_history
    description: Monthly point-in-time data quality snapshots per SKU (2024-01-01 through 2027-02-01). Used by the chargeback prediction model to reconstruct data quality state at shipment time.
    columns:
      - name: sku
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
      - name: data_quality_score
        tests: [not_null]
    tests:
      - unique:
          column_name: "sku || '|' || snapshot_date::text"

  - name: stg_distribution_log
    description: SKU-store authorization records.
    columns:
      - name: sku
        tests: [not_null]
      - name: store_id
        tests: [not_null]
      - name: authorized_date
        tests: [not_null]

  - name: stg_price_history
    description: Historical wholesale price changes.
    columns:
      - name: sku
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]
      - name: effective_date
        tests: [not_null]

  - name: stg_promotions
    description: Promotional events with discount and funding details.
    columns:
      - name: promo_id
        tests: [unique, not_null]
      - name: sku
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]

  - name: stg_scan_data
    description: Weekly POS scan data (~880K rows).
    columns:
      - name: sku
        tests: [not_null]
      - name: store_id
        tests: [not_null]
      - name: week_ending
        tests: [not_null]
      - name: units_sold
        tests: [not_null]

  # ── Retailer pipeline ─────────────────────────────────
  - name: stg_retailers
    description: 6 retailer entities.
    columns:
      - name: retailer_id
        tests: [unique, not_null]
      - name: retailer_name
        tests: [not_null]

  - name: stg_retailer_rules
    description: Dispute rules by retailer and deduction type.
    columns:
      - name: retailer_id
        tests: [not_null]
      - name: deduction_type
        tests: [not_null]

  - name: stg_retailer_requirements
    description: Per-retailer field requirements.
    columns:
      - name: retailer_id
        tests: [not_null]
      - name: field
        tests: [not_null]

  - name: stg_retailer_deduction_codes
    description: Retailer-specific deduction reason codes.
    columns:
      - name: code_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: deduction_type
        tests: [not_null]

  - name: stg_retailer_edi_requirements
    description: EDI compliance requirements by retailer.
    columns:
      - name: retailer_id
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: requirement
        tests: [not_null]

  - name: stg_retailer_orders
    description: ~7,200 retailer purchase orders.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: po_date
        tests: [not_null]
      - name: total_value
        tests: [not_null]

  - name: stg_retailer_order_lines
    description: ~19,000 retailer order line items.
    columns:
      - name: order_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: line_total
        tests: [not_null]

  - name: stg_retailer_remittances
    description: ~144 monthly remittance bundles.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: received_date
        tests: [not_null]

  - name: stg_retailer_deductions
    description: ~2,000 retailer deduction records.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: deduction_type
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]
      - name: deduction_date
        tests: [not_null]

  - name: stg_retailer_disputes
    description: ~800 retailer dispute filings.
    columns:
      - name: dispute_id
        tests: [unique, not_null]
      - name: deduction_id
        tests: [not_null]
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              values: ['won', 'lost', 'partial', 'pending']

  - name: stg_retailer_dispute_evidence
    description: ~2,400 evidence items linked to disputes.
    columns:
      - name: evidence_id
        tests: [unique, not_null]
      - name: dispute_id
        tests: [not_null]

  - name: stg_retailer_shipments
    description: ~7,200 retailer shipment records.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: ship_date
        tests: [not_null]

  - name: stg_retailer_shipment_lines
    description: >
      Per-SKU shipment detail (ordered vs. shipped, shortfall_reason).
      Empty until the causal fulfillment model (Phase 3 Group B) populates it.
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: units_ordered
        tests: [not_null]
      - name: units_shipped
        tests: [not_null]

  - name: stg_retailer_receipt_lines
    description: >
      Per-SKU receiving detail (received vs. shipped, discrepancy_reason).
      Empty until the causal fulfillment model (Phase 3 Group B) populates it.
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: units_received
        tests: [not_null]

  - name: stg_retailer_chargebacks
    description: ~450 legacy chargeback events.
    columns:
      - name: chargeback_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: chargeback_amount
        tests: [not_null]

  - name: stg_retailer_post_audit_claims
    description: ~42 retroactive post-audit claims.
    columns:
      - name: claim_id
        tests: [unique, not_null]
      - name: deduction_id
        tests: [not_null]

  - name: stg_retailer_pack_records
    description: ~7,200 pack/label compliance records.
    columns:
      - name: pack_record_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]

  # ── Distributor pipeline ──────────────────────────────
  - name: stg_distributors
    description: 3 distributor entities.
    columns:
      - name: distributor_id
        tests: [unique, not_null]
      - name: distributor_name
        tests: [not_null]

  - name: stg_sku_distributors
    description: SKU-to-distributor mapping.
    columns:
      - name: sku
        tests: [not_null]
      - name: distributor_id
        tests: [not_null]

  - name: stg_distributor_orders
    description: ~1,400 distributor purchase orders.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: po_date
        tests: [not_null]
      - name: total_value
        tests: [not_null]

  - name: stg_distributor_order_lines
    description: ~7,400 distributor order line items.
    columns:
      - name: order_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: line_total
        tests: [not_null]

  - name: stg_distributor_remittances
    description: ~72 monthly remittance bundles.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: received_date
        tests: [not_null]

  - name: stg_distributor_deductions
    description: ~300 distributor deduction records.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: deduction_type
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]

  - name: stg_distributor_disputes
    description: ~100 distributor dispute filings.
    columns:
      - name: dispute_id
        tests: [unique, not_null]
      - name: deduction_id
        tests: [not_null]
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              values: ['won', 'lost', 'partial', 'pending']

  - name: stg_distributor_shipments
    description: ~1,400 distributor shipment records.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: ship_date
        tests: [not_null]

  - name: stg_distributor_shipment_lines
    description: >
      Per-SKU distributor shipment detail (ordered vs. shipped,
      shortfall_reason). Empty until the causal fulfillment model
      (Phase 3 Group B) populates it.
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: units_ordered
        tests: [not_null]
      - name: units_shipped
        tests: [not_null]

  - name: stg_distributor_chargebacks
    description: ~93 distributor chargeback events.
    columns:
      - name: chargeback_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: chargeback_amount
        tests: [not_null]

  # ── DTC / Shopify pipeline ────────────────────────────
  - name: stg_shopify_orders
    description: ~11,600 Shopify DTC order headers.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_number
        tests: [unique, not_null]
      - name: created_at
        tests: [not_null]
      - name: email
        tests: [not_null]
      - name: financial_status
        tests:
          - not_null
          - accepted_values:
              values: ['paid', 'partially_refunded', 'refunded']

  - name: stg_shopify_order_lines
    description: ~22,300 Shopify DTC line items.
    columns:
      - name: order_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: line_total
        tests: [not_null]

  - name: stg_shopify_transactions
    description: ~11,600 payment transactions.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: processing_fee
        tests: [not_null]

  - name: stg_shopify_payouts
    description: ~60 bi-weekly payout batches.
    columns:
      - name: payout_id
        tests: [unique, not_null]
      - name: payout_date
        tests: [not_null]

  - name: stg_shopify_refunds
    description: ~550 order refunds.
    columns:
      - name: refund_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: refund_amount
        tests: [not_null]

  - name: stg_shopify_chargebacks
    description: ~52 DTC chargebacks.
    columns:
      - name: chargeback_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: chargeback_amount
        tests: [not_null]
