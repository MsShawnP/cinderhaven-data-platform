version: 2

sources:
  - name: raw
    database: cinderhaven
    schema: raw
    description: >
      Landing zone for Cinderhaven data. Channel-isolated pipelines
      (retailer, distributor, DTC) plus shared cross-channel tables.
      41 tables total. Staging models clean, type, and standardize.

    tables:
      # ── Shared tables ─────────────────────────────────────
      - name: product_master
        description: 30 SKUs across 3 product lines (Artisan Sauces, Pantry Staples, Specialty Condiments).

      - name: sku_costs
        description: SKU-level COGS, landed cost, and per-channel wholesale pricing + trade spend.

      - name: stores
        description: 640 retail locations across 6 retailers.

      - name: product_master_history
        description: Monthly point-in-time data quality snapshots per SKU. Synthetic history used by the chargeback prediction model for point-in-time joins at shipment date.

      - name: distribution_log
        description: SKU-store authorization records with auth/deauth dates.

      - name: price_history
        description: Historical wholesale price changes by SKU and retailer.

      - name: promotions
        description: Promotional events with discount depth, cost, and funding mechanism.

      - name: scan_data
        description: ~880K weekly POS scan records. Grain is SKU × store × week_ending.

      # ── Retailer pipeline ─────────────────────────────────
      - name: retailers
        description: 6 retailer entities with dispute portal metadata.

      - name: retailer_rules
        description: Dispute rules by retailer and deduction type.

      - name: retailer_requirements
        description: Per-retailer field requirements (what data fields each retailer demands).

      - name: retailer_deduction_codes
        description: Retailer-specific deduction reason codes mapping to deduction types.

      - name: retailer_edi_requirements
        description: EDI compliance requirements by retailer and category.

      - name: retailer_orders
        description: ~7,200 retailer purchase orders.

      - name: retailer_order_lines
        description: ~19,000 retailer order line items. Grain is order × SKU.

      - name: retailer_remittances
        description: ~144 monthly remittance payment bundles from retailers.

      - name: retailer_deductions
        description: >
          ~20,000 deduction records from retailer remittances. short_ship
          and late_delivery rows are event-driven from fulfillment events
          (Phase 3 Group C); other types ride the legacy stream.

      - name: retailer_disputes
        description: ~800 dispute filings against retailer deductions.

      - name: retailer_dispute_evidence
        description: ~2,400 evidence items linked to retailer disputes.

      - name: retailer_shipments
        description: ~7,200 retailer shipment records.

      - name: retailer_shipment_lines
        description: >
          Per-SKU shipment detail — units ordered vs. units actually shipped,
          with shortfall_reason on shorted lines. Populated by the causal
          fulfillment model (Phase 3 Group B); empty until then.

      - name: retailer_receipt_lines
        description: >
          Per-SKU receiving detail — what the retailer reports receiving vs.
          what shipped, with discrepancy_reason on mismatches. Populated by
          the causal fulfillment model (Phase 3 Group B); empty until then.

      - name: retailer_chargebacks
        description: >
          Compliance chargebacks by month/retailer/reason/SKU. Operational
          reasons (short_ship, late_delivery, receiving_discrepancy) are
          triggered by actual shipment/receipt events (Phase 3 Group C);
          data-defect reasons keep the Path A triggered_by_field pattern.

      - name: retailer_post_audit_claims
        description: ~42 retroactive post-audit claims from third-party auditors.

      - name: retailer_pack_records
        description: ~7,200 pack/label compliance records.

      # ── Distributor pipeline ──────────────────────────────
      - name: distributors
        description: 3 distributor entities (UNFI, KeHE, DPI Northwest).

      - name: sku_distributors
        description: SKU-to-distributor mapping (which distributors carry which SKUs).

      - name: distributor_orders
        description: ~1,400 distributor purchase orders.

      - name: distributor_order_lines
        description: ~7,400 distributor order line items.

      - name: distributor_remittances
        description: ~72 monthly remittance bundles from distributors.

      - name: distributor_deductions
        description: ~300 deduction records from distributor remittances.

      - name: distributor_disputes
        description: ~100 dispute filings against distributor deductions.

      - name: distributor_shipments
        description: ~1,400 distributor shipment records.

      - name: distributor_shipment_lines
        description: >
          Per-SKU distributor shipment detail — units ordered vs. shipped with
          shortfall_reason. No receipt lines for distributors (they report
          discrepancies via deductions). Populated by the causal fulfillment
          model (Phase 3 Group B); empty until then.

      - name: distributor_chargebacks
        description: ~93 distributor chargeback events.

      # ── DTC / Shopify pipeline ────────────────────────────
      - name: shopify_orders
        description: ~11,600 Shopify DTC order headers.

      - name: shopify_order_lines
        description: ~22,300 Shopify DTC line items.

      - name: shopify_transactions
        description: ~11,600 payment transactions with processing fees.

      - name: shopify_payouts
        description: ~60 bi-weekly payout batches.

      - name: shopify_refunds
        description: ~550 order refunds.

      - name: shopify_chargebacks
        description: ~52 DTC chargebacks.
