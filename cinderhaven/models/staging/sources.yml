version: 2

sources:
  - name: raw
    database: cinderhaven
    schema: raw
    description: >
      Landing zone for data ingested from cinderhaven-data SQLite.
      Mirrors source structure with minimal type enforcement.
      Staging models clean, type, and deduplicate these tables.

    tables:
      # ── Reference / Dimension ──────────────────────────────
      - name: product_master
        description: >
          50 SKUs across 3 product lines (Artisan Sauces, Pantry Staples,
          Specialty Condiments). Contains intentional data quality defects
          for staging-layer cleaning (invalid GTINs, missing brand_owner,
          inconsistent serving_size).

      - name: stores
        description: >
          903 retail locations across 11 retailers. Includes aggregated
          channel rows for e-commerce and warehouse-direct.

      - name: distributors
        description: >
          2 distributor entities (UNFI and KeHE). Includes margin
          percentages, payment terms, and coverage area.

      - name: retailers
        description: >
          11 retailer entities (6 contracted + 5 regional chains).
          Includes dispute portal metadata.

      - name: retailer_rules
        description: >
          90 retailer-specific dispute rules per deduction type.
          Defines dispute windows, auto-deduct flags, evidence
          requirements, and typical recovery rates.

      - name: deduction_codes
        description: >
          97 retailer-specific deduction reason codes. Maps retailer
          code IDs to human-readable names and deduction types.

      - name: retailer_requirements
        description: >
          180 retailer field-level requirements for labeling, packaging,
          and compliance. Grain: one row per retailer × field.

      - name: sku_distributors
        description: >
          55 SKU-to-distributor assignments. Junction table linking
          product_master SKUs to distributors.

      - name: edi_requirements
        description: >
          42 EDI compliance requirements by retailer. Covers label,
          ASN, routing, and documentation standards.

      # ── Pricing ────────────────────────────────────────────
      - name: sku_costs
        description: >
          50 SKU-level cost and pricing structure. Includes COGS,
          landed cost, retailer-specific wholesale prices (including
          KeHE and DTC), and trade spend percentages.

      - name: price_history
        description: >
          234 historical wholesale price changes by SKU/retailer.
        loaded_at_field: effective_date
        freshness:
          warn_after: {count: 90, period: day}
          error_after: {count: 180, period: day}

      # ── Distribution & Promotion ───────────────────────────
      - name: distribution_log
        description: >
          7,210 SKU-store authorization records. Tracks when SKUs
          were authorized and deauthorized at each store.
        loaded_at_field: authorized_date
        freshness:
          warn_after: {count: 90, period: day}
          error_after: {count: 180, period: day}

      - name: promotions
        description: >
          185 promotional events with discount depth, duration,
          cost, and funding mechanism.

      # ── Transactions ───────────────────────────────────────
      - name: orders
        description: >
          11,634 B2B purchase orders from retailers. Grain: one row
          per order header.
        loaded_at_field: po_date
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: order_lines
        description: >
          59,496 B2B order line items. Grain: one row per SKU per
          order.

      - name: shipments
        description: >
          11,634 shipment records with carrier, BOL, POD, and ASN
          compliance flags.
        loaded_at_field: ship_date
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: pack_records
        description: >
          11,634 pack/label compliance records. Tracks pick-pack
          accuracy, label scannability, and evidence documentation.

      # ── Sales / POS ────────────────────────────────────────
      - name: scan_data
        description: >
          977,171 weekly POS scan records. Grain: SKU x store x
          week_ending. Covers all retailers via store_id join.
        loaded_at_field: week_ending
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: chargebacks
        description: >
          761 chargeback events in legacy flat format. Pre-dates
          the structured deductions pipeline.

      # ── Deductions / Disputes ──────────────────────────────
      - name: deductions
        description: >
          13,496 deduction records from retailer remittances. Includes
          type classification, vagueness flags, double-dip detection,
          and post-audit markers.
        loaded_at_field: deduction_date
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: disputes
        description: >
          6,105 dispute filing records. Tracks evidence quality,
          filing timeliness, outcome, and labor hours.

      - name: dispute_evidence
        description: >
          11,525 evidence items linked to disputes. Tracks what was
          submitted vs. required per dispute.

      - name: remittances
        description: >
          1,278 remittance (payment) bundles from retailers. Includes
          gross/net amounts, total deductions, and clarity rating.
        loaded_at_field: received_date
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: post_audit_claims
        description: >
          38 retroactive post-audit claims from third-party auditors.
          Tracks lookback period and claim type.

      # ── DTC / E-Commerce ───────────────────────────────────
      - name: shopify_orders
        description: >
          79,000 Shopify DTC order headers. Synthetic data covering
          Jan 2024 through Dec 2026 with seasonal patterns, discount
          codes, and fulfillment tracking.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: shopify_transactions
        description: >
          29,533 Shopify payment transactions. Grain: one row per
          payment attempt. Includes processing fees and net amounts.

      - name: shopify_payouts
        description: >
          191 Shopify payout batches. Aggregated disbursements from
          Shopify Payments to bank account.

      - name: shopify_refunds
        description: >
          1,184 Shopify DTC refund records. Tracks refund amount,
          type (full/partial), and reason per order.

      - name: shopify_chargebacks
        description: >
          232 Shopify DTC chargeback events. Tracks disputed charges,
          fees, and outcomes.

      - name: shopify_order_lines
        description: >
          189,714 Shopify DTC line items. Joins to shopify_orders on
          order_id and to product_master on SKU.
