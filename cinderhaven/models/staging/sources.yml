version: 2

sources:
  - name: raw
    database: cinderhaven
    schema: raw
    description: >
      Landing zone for data ingested from cinderhaven-data SQLite.
      Mirrors source structure with minimal type enforcement.
      Staging models clean, type, and deduplicate these tables.

    tables:
      # ── Reference / Dimension ──────────────────────────────
      - name: product_master
        description: >
          90 SKUs across 3 product lines (Artisan Sauces, Pantry Staples,
          Specialty Condiments). Contains intentional data quality defects
          for staging-layer cleaning (invalid GTINs, missing brand_owner,
          inconsistent serving_size).

      - name: stores
        description: >
          902 retail locations across 11 retailers. Includes aggregated
          channel rows for e-commerce and warehouse-direct.

      - name: retailers
        description: >
          11 retailer entities (6 contracted + 5 regional chains).
          Includes dispute portal metadata.

      - name: retailer_rules
        description: >
          90 retailer-specific dispute rules per deduction type.
          Defines dispute windows, auto-deduct flags, evidence
          requirements, and typical recovery rates.

      - name: deduction_codes
        description: >
          97 retailer-specific deduction reason codes. Maps retailer
          code IDs to human-readable names and deduction types.

      - name: edi_requirements
        description: >
          42 EDI compliance requirements by retailer. Covers label,
          ASN, routing, and documentation standards.

      # ── Pricing ────────────────────────────────────────────
      - name: sku_costs
        description: >
          90 SKU-level cost and pricing structure. Includes COGS,
          landed cost, retailer-specific wholesale prices, and
          trade spend percentages.

      - name: price_history
        description: >
          398 historical wholesale price changes by SKU/retailer.

      # ── Distribution & Promotion ───────────────────────────
      - name: distribution_log
        description: >
          12,507 SKU-store authorization records. Tracks when SKUs
          were authorized and deauthorized at each store.

      - name: promotions
        description: >
          188 promotional events with discount depth, duration,
          cost, and funding mechanism.

      # ── Transactions ───────────────────────────────────────
      - name: orders
        description: >
          5,838 B2B purchase orders from retailers. Grain: one row
          per order header.

      - name: order_lines
        description: >
          30,127 B2B order line items. Grain: one row per SKU per
          order.

      - name: shipments
        description: >
          5,838 shipment records with carrier, BOL, POD, and ASN
          compliance flags.

      - name: pack_records
        description: >
          5,838 pack/label compliance records. Tracks pick-pack
          accuracy, label scannability, and evidence documentation.

      # ── Sales / POS ────────────────────────────────────────
      - name: scan_data
        description: >
          1,118,009 weekly POS scan records. Grain: SKU × store ×
          week_ending. Covers all retailers via store_id join.

      - name: chargebacks
        description: >
          381 chargeback events in legacy flat format. Pre-dates
          the structured deductions pipeline.

      # ── Deductions / Disputes ──────────────────────────────
      - name: deductions
        description: >
          3,087 deduction records from retailer remittances. Includes
          type classification, vagueness flags, double-dip detection,
          and post-audit markers.

      - name: disputes
        description: >
          1,410 dispute filing records. Tracks evidence quality,
          filing timeliness, outcome, and labor hours.

      - name: dispute_evidence
        description: >
          3,092 evidence items linked to disputes. Tracks what was
          submitted vs. required per dispute.

      - name: remittances
        description: >
          515 remittance (payment) bundles from retailers. Includes
          gross/net amounts, total deductions, and clarity rating.

      - name: post_audit_claims
        description: >
          45 retroactive post-audit claims from third-party auditors.
          Tracks lookback period and claim type.

      # ── DTC / E-Commerce ───────────────────────────────────
      - name: shopify_orders
        description: >
          10,000 Shopify DTC order headers. Synthetic data covering
          the 18-month window with seasonal patterns, discount codes,
          and fulfillment tracking.

      - name: shopify_order_lines
        description: >
          19,347 Shopify DTC line items. Joins to shopify_orders on
          order_id and to product_master on SKU.
