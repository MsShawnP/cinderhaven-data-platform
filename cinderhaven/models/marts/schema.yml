version: 2

models:
  # ── Dimensions ─────────────────────────────────────────
  - name: dim_products
    description: >
      Product dimension with GTIN hierarchy, pricing, cost, and margins.
      Grain: one row per SKU.
    columns:
      - name: sku
        description: Primary key — Cinderhaven SKU code.
        tests: [unique, not_null]
      - name: product_name
        description: Display name for the product.
        tests: [not_null]
      - name: product_line
        description: Top-level product family.
        tests: [not_null]

  - name: dim_retailers
    description: >
      Retailer dimension with store counts and dispute metadata.
      Grain: one row per retailer.
    columns:
      - name: retailer_id
        description: Primary key — unique retailer identifier.
        tests: [unique, not_null]
      - name: retailer_name
        description: Retailer display name.
        tests: [not_null]

  - name: dim_deduction_reasons
    description: >
      Deduction reason code dimension from crosswalk.
      Grain: one row per code_id.
    columns:
      - name: code_id
        description: Primary key — deduction reason code identifier.
        tests: [unique, not_null]

  - name: dim_stores
    description: >
      Store dimension with retailer association and geography.
      Grain: one row per store.
    columns:
      - name: store_id
        description: Primary key — unique store identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
      - name: retailer_name
        description: Retailer display name.
        tests: [not_null]

  # ── Facts ──────────────────────────────────────────────
  - name: fct_orders
    description: >
      Unified order lines across B2B and DTC channels.
      Grain: one row per order line item.
    columns:
      - name: line_id
        description: Unique line item identifier (order_line_id for B2B, line_id for DTC).
        tests: [not_null]
      - name: order_id
        description: Parent order identifier.
        tests: [not_null]
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: channel
        description: Sales channel — B2B (wholesale) or DTC (Shopify).
        tests:
          - not_null
          - accepted_values:
              values: ['B2B', 'DTC']

  - name: fct_shipments
    description: >
      Shipment fact with compliance flags.
      Grain: one row per shipment.
    columns:
      - name: shipment_id
        description: Primary key — unique shipment identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the fulfilled order.
        tests: [not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id

  - name: fct_deductions
    description: >
      Deduction fact with dispute outcomes and financial impact.
      Grain: one row per deduction.
    columns:
      - name: deduction_id
        description: Primary key — unique deduction identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
      - name: deduction_amount
        description: Original deduction amount in USD.
        tests: [not_null]

  - name: fct_chargebacks
    description: >
      Legacy chargeback events.
      Grain: one row per chargeback.
    columns:
      - name: retailer
        description: Retailer name that issued the chargeback.
        tests: [not_null]
      - name: amount
        description: Chargeback amount in USD.
        tests: [not_null]

  - name: fct_payments
    description: >
      Remittance (payment) fact with deduction summaries.
      Grain: one row per remittance.
    columns:
      - name: remittance_id
        description: Primary key — unique remittance identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id

  - name: fct_scan_data
    description: >
      Point-of-sale scan data by SKU, store, and week.
      Grain: one row per SKU × store × week.
    columns:
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: store_id
        description: Foreign key to dim_stores.
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: week_ending
        description: Week-ending date for the scan period.
        tests: [not_null]
      - name: units_sold
        description: Units sold during the scan week.
        tests: [not_null]
      - name: dollars_sold
        description: Dollar sales during the scan week.
        tests: [not_null]

  - name: fct_promotions
    description: >
      Trade promotion events with cost and discount details.
      Grain: one row per promotion event.
    columns:
      - name: promo_id
        description: Primary key — unique promotion identifier.
        tests: [unique, not_null]
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
      - name: promo_type
        description: Type of promotion.
        tests: [not_null]

  - name: fct_distribution
    description: >
      SKU-store authorization and deauthorization history.
      Grain: one row per SKU × store authorization event.
    columns:
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: store_id
        description: Foreign key to dim_stores.
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: authorized_date
        description: Date the SKU was authorized at the store.
        tests: [not_null]
      - name: is_currently_authorized
        description: Whether the SKU is still authorized (no deauthorization date).
        tests: [not_null]
