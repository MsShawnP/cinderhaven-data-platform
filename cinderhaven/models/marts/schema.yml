version: 2

models:
  # ── Dimensions ─────────────────────────────────────────
  - name: dim_products
    description: >
      Product dimension with GTIN hierarchy, pricing, cost, and margins.
      Grain: one row per SKU.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_name
        tests: [not_null]
      - name: product_line
        tests: [not_null]

  - name: dim_retailers
    description: >
      Retailer dimension with store counts and dispute metadata.
      Grain: one row per retailer.
    columns:
      - name: retailer_id
        tests: [unique, not_null]
      - name: retailer_name
        tests: [not_null]

  - name: dim_deduction_reasons
    description: >
      Deduction reason code dimension from crosswalk.
      Grain: one row per code_id.
    columns:
      - name: code_id
        tests: [unique, not_null]

  # ── Facts ──────────────────────────────────────────────
  - name: fct_orders
    description: >
      Unified order lines across B2B and DTC channels.
      Grain: one row per order line item.
    columns:
      - name: line_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: channel
        tests:
          - not_null
          - accepted_values:
              values: ['B2B', 'DTC']

  - name: fct_shipments
    description: >
      Shipment fact with compliance flags.
      Grain: one row per shipment.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id

  - name: fct_deductions
    description: >
      Deduction fact with dispute outcomes and financial impact.
      Grain: one row per deduction.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
      - name: deduction_amount
        tests: [not_null]

  - name: fct_chargebacks
    description: >
      Legacy chargeback events.
      Grain: one row per chargeback.
    columns:
      - name: retailer
        tests: [not_null]
      - name: amount
        tests: [not_null]

  - name: fct_payments
    description: >
      Remittance (payment) fact with deduction summaries.
      Grain: one row per remittance.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
