version: 2

models:
  # ── Retailer marts ────────────────────────────────────
  - name: dim_retailers
    description: Retailer dimension with store counts and order summary.
    columns:
      - name: retailer_id
        tests: [unique, not_null]
      - name: retailer_name
        tests: [not_null]

  - name: fct_retailer_orders
    description: Retailer order fact with line counts and shipment details.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: total_value
        tests: [not_null]

  - name: fct_retailer_deductions
    description: Retailer deduction lifecycle — amount, dispute, recovery.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]
      - name: deduction_status
        tests:
          - not_null
          - accepted_values:
              values: ['disputed', 'expired', 'open']

  - name: fct_retailer_shipments
    description: Retailer shipment performance with on-time metrics.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: ship_date
        tests: [not_null]

  - name: fct_retailer_shipment_lines
    description: >
      Per-SKU shipment lines — units ordered vs. shipped with
      shortfall_reason, joined to retailer. The causal source for fill
      rates and short-ship events. Empty until Phase 3 Group B data lands.
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]
      - name: units_ordered
        tests: [not_null]
      - name: units_shipped
        tests: [not_null]

  - name: fct_retailer_receipt_lines
    description: >
      Per-SKU receiving lines — what the retailer reports receiving vs.
      what shipped, with discrepancy_reason. Feeds receiving-discrepancy
      chargebacks and the retailer-scored OTIF gap.
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]
      - name: units_received
        tests: [not_null]

  - name: fct_retailer_payments
    description: Retailer remittance-level payments with deduction summary.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: gross_amount
        tests: [not_null]

  - name: mart_retailer_reconciliation
    description: Retailer pipeline reconciliation — orders vs remittances vs deductions.
    columns:
      - name: retailer_id
        tests: [unique, not_null]

  # ── Distributor marts ─────────────────────────────────
  - name: dim_distributors
    description: Distributor dimension with SKU counts and order summary.
    columns:
      - name: distributor_id
        tests: [unique, not_null]
      - name: distributor_name
        tests: [not_null]

  - name: fct_distributor_orders
    description: Distributor order fact with line counts and shipment details.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: total_value
        tests: [not_null]

  - name: fct_distributor_deductions
    description: Distributor deduction lifecycle — amount, dispute, recovery.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]
      - name: deduction_status
        tests:
          - not_null
          - accepted_values:
              values: ['disputed', 'open']

  - name: fct_distributor_shipment_lines
    description: >
      Per-SKU distributor shipment lines — units ordered vs. shipped with
      shortfall_reason. No receipt lines for distributors (discrepancies
      arrive via deductions).
    columns:
      - name: shipment_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: distributor_id
        tests: [not_null]
      - name: units_ordered
        tests: [not_null]
      - name: units_shipped
        tests: [not_null]

  - name: fct_distributor_shipments
    description: Distributor shipment records.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]

  - name: fct_distributor_payments
    description: Distributor remittance-level payments with deduction summary.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: distributor_id
        tests: [not_null]

  - name: mart_distributor_reconciliation
    description: Distributor pipeline reconciliation.
    columns:
      - name: distributor_id
        tests: [unique, not_null]

  # ── DTC marts ─────────────────────────────────────────
  - name: dim_dtc_channels
    description: DTC channel dimension — Shopify summary statistics.
    columns:
      - name: channel_id
        tests: [unique, not_null]

  - name: fct_dtc_orders
    description: DTC order fact with COGS, fees, refunds, and net revenue.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]

  - name: fct_dtc_transactions
    description: DTC payment transactions with fee rates.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: order_amount
        tests: [not_null]

  - name: fct_dtc_refunds
    description: DTC refund records with order context.
    columns:
      - name: refund_id
        tests: [unique, not_null]
      - name: refund_amount
        tests: [not_null]

  - name: fct_dtc_chargebacks
    description: DTC chargeback records with order context.
    columns:
      - name: chargeback_id
        tests: [unique, not_null]
      - name: chargeback_amount
        tests: [not_null]

  - name: mart_dtc_reconciliation
    description: DTC pipeline reconciliation — orders vs transactions vs payouts.
    columns:
      - name: channel_id
        tests: [unique, not_null]

  # ── Shared marts ──────────────────────────────────────
  - name: dim_products
    description: >
      Product dimension — the canonical product master. Contains physical
      attributes, barcodes, pricing, cost, trade spend, and distribution
      breadth. Sole source of truth for product-master fields; downstream
      consumers read this, not raw tables.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_name
        tests: [not_null]
      - name: product_line
        tests:
          - not_null
          - accepted_values:
              values: ['Artisan Sauces', 'Pantry Staples', 'Specialty Condiments', 'Dried Goods', 'Snack Bites']
      - name: gtin14
        description: GS1 GTIN-14 barcode (may be null or invalid — data quality consumers validate this).
      - name: upc
        description: UPC-A / EAN-13 barcode (may be null or invalid).
      - name: unit_weight_lbs
      - name: case_weight_lbs
      - name: case_length_in
      - name: case_width_in
      - name: case_height_in
      - name: brand_owner
      - name: country_of_origin
      - name: last_updated
      - name: cogs_per_unit
        tests: [not_null]
      - name: wholesale_price
        tests: [not_null]
      - name: margin_per_unit
        description: Wholesale margin per unit (wholesale_price - cogs_per_unit), rounded to 2 decimal places.
        tests: [not_null]
      - name: margin_pct
        description: Wholesale margin percentage ((wholesale_price - cogs_per_unit) / wholesale_price), rounded to 4 decimal places.
        tests: [not_null]

  - name: fct_chargebacks
    description: Retailer chargebacks with retailer name resolved.
    columns:
      - name: chargeback_id
        tests: [unique, not_null]
      - name: sku
        tests: [not_null]
      - name: retailer
        tests: [not_null]
      - name: amount
        tests: [not_null]
      - name: reason
        tests: [not_null]
      - name: month
        tests: [not_null]

  - name: dim_stores
    description: Store dimension with retailer name resolved from dim_retailers.
    columns:
      - name: store_id
        tests: [unique, not_null]
      - name: retailer
        tests: [not_null]

  - name: fct_scan_data
    description: Weekly POS scan data at SKU-store grain.
    columns:
      - name: sku
        tests: [not_null]
      - name: store_id
        tests: [not_null]
      - name: week_ending
        tests: [not_null]
      - name: units_sold
        tests: [not_null]

  - name: fct_promotions
    description: Promotional events with retailer name resolved.
    columns:
      - name: promo_id
        tests: [unique, not_null]
      - name: sku
        tests: [not_null]
      - name: retailer
        tests: [not_null]

  - name: dim_retailer_requirements
    description: Retailer data-field requirements with retailer name resolved.
    columns:
      - name: retailer
        tests: [not_null]
      - name: field
        tests: [not_null]

  - name: fct_distribution
    description: SKU-store authorization with scan velocity metrics.
    columns:
      - name: sku
        tests: [not_null]
      - name: store_id
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]

  - name: dim_category_benchmarks
    description: Product line benchmarks — velocity, margin, and revenue.
    columns:
      - name: product_line
        tests: [unique, not_null]

  # ── Velocity analytics ────────────────────────────────
  - name: mart_quarterly_sppd
    description: >
      Pre-aggregated Scans Per Point of Distribution per Day at
      sku × year × quarter grain. SPPD = Total Units ÷ Carrying
      Stores ÷ Days in Period. Single source of truth — downstream
      tools query this instead of re-aggregating fct_scan_data.
    columns:
      - name: sku
        description: Product SKU.
        tests: [not_null]
      - name: year
        description: Calendar year.
        tests: [not_null]
      - name: quarter
        description: Calendar quarter (1-4).
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4]
      - name: total_units
        description: Total units sold across all carrying stores in the quarter.
        tests: [not_null]
      - name: carrying_stores
        description: Count of distinct stores with at least one scan in the quarter.
        tests: [not_null]
      - name: days_in_period
        description: Calendar days spanned by scan data in the quarter.
        tests: [not_null]
      - name: sppd
        description: >
          Scans Per Point of Distribution per Day.
          Formula: total_units / carrying_stores / days_in_period.
        tests: [not_null]

  - name: mart_sku_scan_totals
    description: >
      Full-history scan totals at SKU grain. Eliminates the runtime
      GROUP BY over fct_scan_data for the unfiltered path in spinrate.
    columns:
      - name: sku
        description: Product SKU.
        tests: [unique, not_null]
      - name: total_units
        description: Total units sold across all stores and weeks.
        tests: [not_null]
      - name: total_dollars
        description: Total dollar sales across all stores and weeks.
        tests: [not_null]
      - name: door_count
        description: Count of distinct stores with at least one scan.
        tests: [not_null]

  # ── Cross-channel rollup ──────────────────────────────
  - name: mart_channel_contribution
    description: >
      Cross-channel revenue rollup — the only place where retailer,
      distributor, and DTC pipelines merge.
    columns:
      - name: channel
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['Retailer', 'Distributor', 'DTC']
      - name: gross_revenue
        tests: [not_null]
      - name: total_fulfillment
        description: DTC shipping/fulfillment cost (0 for Retailer and Distributor).
        tests: [not_null]
      - name: total_platform_fees
        description: DTC platform + payment processing fees (0 for Retailer and Distributor).
        tests: [not_null]
