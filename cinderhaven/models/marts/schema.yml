version: 2

models:
  # ── Dimensions ─────────────────────────────────────────
  - name: dim_products
    description: >
      Product dimension with GTIN hierarchy, pricing, cost, and margins.
      Grain: one row per SKU.
    columns:
      - name: sku
        description: Primary key — Cinderhaven SKU code.
        tests: [unique, not_null]
      - name: product_name
        description: Display name for the product.
        tests: [not_null]
      - name: product_line
        description: Top-level product family.
        tests: [not_null]
      - name: msrp
        description: Manufacturer's suggested retail price.
        tests:
          - positive_value
      - name: msrp_margin_pct
        description: Margin as a fraction of MSRP — expected between 0 and 1.
        tests:
          - ratio_within_bounds:
              min_value: 0
              max_value: 1

  - name: dim_retailers
    description: >
      Retailer dimension with store counts and dispute metadata.
      Grain: one row per retailer.
    columns:
      - name: retailer_id
        description: Primary key — unique retailer identifier.
        tests: [unique, not_null]
      - name: retailer_name
        description: Retailer display name.
        tests: [not_null]

  - name: dim_deduction_reasons
    description: >
      Deduction reason code dimension from crosswalk.
      Grain: one row per code_id.
    columns:
      - name: code_id
        description: Primary key — deduction reason code identifier.
        tests: [unique, not_null]

  # ── Facts ──────────────────────────────────────────────
  - name: fct_orders
    description: >
      Unified order lines across B2B and DTC channels.
      Grain: one row per order line item.
    columns:
      - name: line_id
        description: Unique line item identifier (order_line_id for B2B, line_id for DTC).
        tests: [not_null]
      - name: order_id
        description: Parent order identifier.
        tests: [not_null]
      - name: sku
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: sku
      - name: channel
        description: Sales channel — B2B (wholesale) or DTC (Shopify).
        tests:
          - not_null
          - accepted_values:
              values: ['B2B', 'DTC']

  - name: fct_shipments
    description: >
      Shipment fact with compliance flags.
      Grain: one row per shipment.
    columns:
      - name: shipment_id
        description: Primary key — unique shipment identifier.
        tests: [unique, not_null]
      - name: order_id
        description: Foreign key to the fulfilled order.
        tests: [not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id

  - name: fct_deductions
    description: >
      Deduction fact with dispute outcomes and financial impact.
      Grain: one row per deduction.
    columns:
      - name: deduction_id
        description: Primary key — unique deduction identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
      - name: deduction_amount
        description: Original deduction amount in USD.
        tests:
          - not_null
          - positive_value

  - name: fct_chargebacks
    description: >
      Legacy chargeback events.
      Grain: one row per chargeback.
    columns:
      - name: retailer
        description: Retailer name that issued the chargeback.
        tests: [not_null]
      - name: amount
        description: Chargeback amount in USD.
        tests: [not_null]

  - name: fct_payments
    description: >
      Remittance (payment) fact with deduction summaries.
      Grain: one row per remittance.
    columns:
      - name: remittance_id
        description: Primary key — unique remittance identifier.
        tests: [unique, not_null]
      - name: retailer_id
        description: Foreign key to dim_retailers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_retailers')
              field: retailer_id
