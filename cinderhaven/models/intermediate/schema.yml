version: 2

models:
  - name: int_retailer_payments
    description: >
      Deduction lifecycle view — each retailer deduction joined with its
      remittance context and dispute resolution (if any).
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]
      - name: deduction_date
        tests: [not_null]
      - name: deduction_status
        tests:
          - not_null
          - accepted_values:
              values: ['disputed', 'expired', 'open']
      - name: net_deduction_amount
        tests: [not_null]

  - name: int_retailer_deduction_crosswalk
    description: >
      Deduction code lookup — each retailer deduction code enriched with
      the dispute rules for its deduction type.
    columns:
      - name: code_id
        tests: [unique, not_null]
      - name: retailer_id
        tests: [not_null]
      - name: deduction_type
        tests: [not_null]

  - name: int_product_retailers
    description: >
      Product-retailer pricing grid — one row per SKU per retailer with
      channel-specific wholesale price, COGS, and margin.
    columns:
      - name: sku
        tests: [not_null]
      - name: retailer_id
        tests: [not_null]
      - name: wholesale_price
        tests: [not_null]
      - name: cogs_per_unit
        tests: [not_null]
      - name: margin_per_unit
        tests: [not_null]

  - name: int_product_distributors
    description: >
      Product-distributor pricing grid — one row per SKU per distributor
      with channel-specific wholesale price, COGS, and margin.
    columns:
      - name: sku
        tests: [not_null]
      - name: distributor_id
        tests: [not_null]
      - name: wholesale_price
        tests: [not_null]
      - name: cogs_per_unit
        tests: [not_null]
      - name: margin_per_unit
        tests: [not_null]

  - name: int_all_partners
    description: >
      Cross-channel partner dimension — retailers and distributors unified
      with a common partner_id and channel_type discriminator.
    columns:
      - name: partner_id
        tests: [unique, not_null]
      - name: name
        tests: [not_null]
      - name: channel_type
        tests:
          - not_null
          - accepted_values:
              values: ['retailer', 'distributor']

  - name: int_all_deductions
    description: >
      Cross-channel deductions — retailer and distributor deductions unified
      with partner_id. Retailer-only columns (code_id, dispute_deadline,
      is_post_audit) are NULL for distributor rows.
    columns:
      - name: deduction_id
        tests: [unique, not_null]
      - name: partner_id
        tests: [not_null]
      - name: channel_type
        tests: [not_null]
      - name: deduction_amount
        tests: [not_null]

  - name: int_all_orders
    description: >
      Cross-channel orders — retailer and distributor orders unified with
      partner_id. Retailer-only columns (requested_ship_date) are NULL for
      distributor rows.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: partner_id
        tests: [not_null]
      - name: channel_type
        tests: [not_null]

  - name: int_all_disputes
    description: >
      Cross-channel disputes — retailer and distributor disputes unified.
      Retailer-only columns (filing_method, evidence_quality) are NULL for
      distributor rows.
    columns:
      - name: dispute_id
        tests: [unique, not_null]
      - name: deduction_id
        tests: [not_null]

  - name: int_all_shipments
    description: >
      Cross-channel shipments — retailer and distributor shipments unified.
      Retailer-only columns (bol_number, pallets_shipped, asn_sent,
      asn_sent_late) are NULL for distributor rows.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]

  - name: int_all_remittances
    description: >
      Cross-channel remittances — retailer and distributor remittances
      unified with partner_id. Retailer-only columns (remittance_format,
      clarity) are NULL for distributor rows.
    columns:
      - name: remittance_id
        tests: [unique, not_null]
      - name: partner_id
        tests: [not_null]

  - name: int_loaded_contribution_by_sku
    description: >
      Per-SKU fully loaded contribution (retailer channel). Grain is one row
      per SKU. Revenue minus COGS, promotional trade spend, chargebacks, and
      order-level deductions prorated by revenue share.
      COGS formula: cases_ordered × case_pack_qty × cogs_per_unit (B2B).
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_line
        tests: [not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: total_cogs
        tests: [not_null]
      - name: loaded_contribution
        tests: [not_null]

  - name: int_shelf_space_cost_by_sku
    description: >
      Per-SKU annual cost to maintain shelf presence. Grain is one row per SKU.
      Combines actual promotional costs from stg_promotions with a $400/store/year
      proxy for data maintenance and compliance overhead.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_line
        tests: [not_null]
      - name: active_store_count
        tests: [not_null]
      - name: annual_shelf_space_cost
        tests: [not_null]

  - name: int_cannibalization_pairs
    description: >
      Per-SKU proxy cannibalization signal using cross-sectional velocity comparison.
      Grain is one row per SKU. velocity_delta_pct is negative when a SKU's
      velocity is lower in stores that also carry sibling SKUs from the same
      product_line. Methodology note is carried on every row.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_line
        tests: [not_null]
      - name: methodology_note
        tests: [not_null]

  - name: int_dtc_order_economics
    description: >
      Order-level DTC economics — each Shopify order with payment processing
      fees, refunds, chargebacks, and computed net revenue.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_number
        tests: [not_null]
      - name: gross_revenue
        tests: [not_null]
      - name: net_revenue
        tests: [not_null]
